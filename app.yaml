command:
  - "sh"
  - "-c"
  - |
    curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash &&
    export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" &&
    nvm install --lts && nvm use --lts &&
    npm install -g coalesce-transform-mcp &&
    pip install -q -r requirements.txt &&
    NVM_BIN=$(. "$NVM_DIR/nvm.sh" && nvm which current | xargs dirname) &&
    PATH="$NVM_BIN:$PATH" uvicorn server:app --host 0.0.0.0 --port 8000

env:
  - name: COALESCE_ACCESS_TOKEN
    valueFrom: coalesce-mcp
  - name: COALESCE_BASE_URL
    value: "https://app.australia-southeast1.gcp.coalescesoftware.io"