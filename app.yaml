command: ["sh", "-c", "pip install -q -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port 8000"]

env:
  - name: COALESCE_ACCESS_TOKEN
    valueFrom:
      secretRef:
        name: coalesce-mcp
        key: coalesce-access-token
  - name: COALESCE_BASE_URL
    value: "https://app.australia-southeast1.gcp.coalescesoftware.io"
  - name: PORT
    value: "8000"
